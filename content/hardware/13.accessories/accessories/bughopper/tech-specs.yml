Board:
  Name: Arduino® Bughopper
  SKU: ABX00156
USB Bridge:
  IC: FT230XQ-R
  Baud Rate Range: 300 bps to 3 Mbps
Level Translator:
  IC: SN74AVC2T245RSWR
  Logic A (FTDI side): +3.3 VDC
  Logic B (target side): VTARGET (supplied by connected target board)
USB:
  USB-C®: Host connection (to development machine)
Output Connectors:
  J2: Female 2.54 mm 2×5 header (direct target board JCTL header connection)
  J3: Male 1.27 mm 2×5 header (ribbon cable connection)
Auxiliary GPIOs:
  Lines: 4 (CBUS0–CBUS3)
  Output type: Open-drain
LEDs:
  DL1: Green (+3.3 VDC power indicator)
  DL2: Yellow (TXD activity indicator)
  DL3: Red (VTARGET power indicator)
  DL4: Yellow (RXD activity indicator)
Power:
  Input voltage: +5 VDC via USB-C®
  Internal logic voltage: +3.3 VDC (generated by the FT230XQ)
  Target voltage (VTARGET): Supplied by the connected target board
Dimensions:
  Width: 11 mm
  Length: 38.5 mm