name: Validate App Lab

on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate Markdown
        id: markdown
        run: |
          cd scripts/validation
          ./content-lint.sh -p '../../content/software/app-lab/'

      - name: Validate Links
        id: links
        if: always()
        run: python3 scripts/validation/relative_links.py validate content/software/app-lab

      - name: Validate Images
        id: images
        if: always()
        run: python3 scripts/validation/image_links/image_links.py validate content/software/app-lab

      - name: Generate Summary
        if: always()
        run: |
          echo "## App Lab Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          
          markdown_status="${{ steps.markdown.outcome }}"
          links_status="${{ steps.links.outcome }}"
          images_status="${{ steps.images.outcome }}"
          
          function format_status() {
            if [ "$1" == "success" ]; then
              echo "✅ Passed"
            elif [ "$1" == "skipped" ]; then
              echo "⏭️ Skipped"
            else
              echo "❌ Failed"
            fi
          }
          
          echo "| **Markdown** | $(format_status $markdown_status) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Links** | $(format_status $links_status) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Images** | $(format_status $images_status) |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Expand the failed steps above for detailed error messages." >> $GITHUB_STEP_SUMMARY
